  # METHODOLOGY
  # ═══════════════════════════════════════════════════════════════
  - type: methodology
    title: "Methodology & Research Approach"
    content: |
      This report is the product of a multi-method research approach designed to provide rigorous, data-driven insights into the climate adaptation and resilience infrastructure market. Our methodology combines five research streams:

      Primary Research: We conducted structured interviews with 32 industry participants including adaptation infrastructure developers, climate resilience technology providers, multilateral development bank climate finance specialists, insurance industry climate risk analysts, and institutional investors active in infrastructure and climate-aligned strategies.

      Secondary Research: We systematically reviewed publicly available information from multilateral institutions (World Bank, IMF, OECD, UNEP), national governments (adaptation plans, infrastructure budgets, climate risk assessments), industry associations (Global Infrastructure Hub, International Federation of Consulting Engineers), academic literature, and financial disclosures.

      Quantitative Analysis: We developed original market sizing models based on bottom-up analysis of public infrastructure budgets, multilateral development bank project databases, insurance industry data, and climate finance tracking by the Climate Policy Initiative. Our projections incorporate IPCC climate scenarios, infrastructure cost data from the Global Infrastructure Hub and Oxford Global Projects, and technology cost learning curves.

      Data Sources: Economic and development data was sourced from the World Bank Data API. Climate physical risk data was drawn from the IPCC Sixth Assessment Report, the World Resources Institute Aqueduct tool, and the Notre Dame Global Adaptation Initiative (ND-GAIN) Country Index. Infrastructure investment data was sourced from the Global Infrastructure Hub, IJGlobal transaction database, and Climate Bonds Initiative.

      Limitations: Market sizing estimates necessarily involve judgment, particularly for nature-based solutions and technology-enabled adaptation where standardized market data is limited. Our projections are sensitive to assumptions about climate policy ambition, technology cost trajectories, and the pace of climate impacts. Scenario analyses are provided to frame the range of plausible outcomes. This report reflects market conditions and available data as of July 2025.

