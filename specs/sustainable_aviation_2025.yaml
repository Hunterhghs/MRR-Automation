  - type: chapter
    title: "Sustainable Aviation Fuel: Technology Pathways & Production Economics"
    content: |
      Sustainable aviation fuel is the cornerstone of aviation's decarbonization strategy through at least 2040. This chapter examines the technology pathways for SAF production, the economics of each pathway, the feedstock availability constraints that will shape the industry's development, and the production capacity pipeline that will determine the pace of SAF adoption.

    subsections:
      - type: section
        title: "2.1 SAF Production Pathways: From Waste to E-Fuels"
        content: |
          SAF can be produced through multiple technology pathways, each with distinct feedstocks, production processes, carbon intensities, and cost structures. The diversity of pathways is a strength — enabling production from a wide range of feedstocks suited to different regions — but also creates complexity for investors and policymakers evaluating which technologies to support.

          HEFA (Hydroprocessed Esters and Fatty Acids) is the most commercially mature pathway, accounting for approximately 85% of current SAF production. HEFA-SAF is produced from waste fats, oils, and greases — primarily used cooking oil, animal fats (tallow), and vegetable oil processing residues — through a hydroprocessing process similar to that used for renewable diesel. The technology is proven at commercial scale, with plants operating since 2016. The primary constraint is feedstock availability: global used cooking oil collection is estimated at 20–25 million tonnes annually, sufficient for perhaps 15–20 million tonnes of SAF production — a fraction of the 300+ million tonnes of jet fuel consumed annually. Competition for these feedstocks from renewable diesel production (which typically offers higher margins) further constrains HEFA-SAF expansion.

          Alcohol-to-Jet (ATJ) converts ethanol or isobutanol into jet fuel through dehydration, oligomerization, and hydrogenation. The pathway is commercially demonstrated (LanzaJet's Freedom Pines plant in Georgia, USA, began production in 2024) and can utilize established ethanol production infrastructure. ATJ-SAF from corn ethanol (USA) or sugarcane ethanol (Brazil) offers a lower-cost pathway than HEFA, but faces sustainability concerns regarding land use, food competition, and the carbon intensity of first-generation biofuel feedstocks. Advanced ATJ using cellulosic ethanol from agricultural residues or dedicated energy crops addresses these concerns but has higher production costs.

          Fischer-Tropsch (FT) synthesis gasifies biomass (forestry residues, agricultural waste, municipal solid waste) or municipal solid waste into syngas (CO + H₂), which is then converted to liquid hydrocarbons via the established Fischer-Tropsch process. FT-SAF offers the advantage of utilizing abundant, low-cost waste feedstocks and can achieve very high lifecycle emission reductions (85–95% below conventional jet fuel). The technology has been demonstrated at pilot and demonstration scales, with several commercial-scale plants under development. The primary challenges are high capital costs (USD 500–800 million for a 100,000 tonne/year plant) and feedstock logistics.

          Power-to-Liquid (PtL) or e-fuels represent the most scalable long-term pathway. PtL-SAF is produced by combining green hydrogen (from renewable electricity-powered electrolysis) with captured CO₂ (from industrial sources or direct air capture) through a synthesis process. PtL offers effectively unlimited feedstock availability (renewable electricity, water, and CO₂), very high lifecycle emission reductions (90–99%), and no competition with food production or land use. However, costs remain 3–7× conventional jet fuel due to the high cost of green hydrogen and CO₂ capture. Rapidly declining renewable electricity and electrolyzer costs — green hydrogen production costs are projected to fall from USD 4–6/kg in 2024 to USD 1.5–2.5/kg by 2035 — will determine the pace of PtL-SAF commercialization.

