    title: "References & Data Sources"
    content: |
      Primary Data Sources: World Bank Data API (data.worldbank.org), FAOStat (fao.org/faostat), AgFunder AgriFoodTech Investment Report 2024, Crunchbase / PitchBook AgTech investment data, GSMA Mobile Economy Report 2024.

      Institutional Sources: World Bank — Digital Agriculture Report; African Development Bank — Technologies for African Agricultural Transformation; Bill & Melinda Gates Foundation — Agricultural Development Strategy; CGIAR — Research Program on Climate Change, Agriculture and Food Security; International Food Policy Research Institute (IFPRI).

      Academic & Research: Journal of Development Economics — Impact evaluations of digital agricultural extension; Science — Satellite-based yield estimation; Nature Sustainability — Precision agriculture for smallholders; Various country-level agricultural technology adoption surveys.

      Report Methodology: Primary interviews: 28 industry participants (Q2 2025). Market sizing: Bottom-up based on startup revenues, input markets, mobile money data. Forecast period: 2025–2030. Scenario analysis: Three probability-weighted scenarios. Reflects data as of July 2025.

