  - type: executive_summary
    content: |
      Aviation stands at the threshold of its most profound technological transformation since the jet engine. The sector, which contributes approximately 2.5% of global CO₂ emissions and 3.5% of effective radiative forcing when non-CO₂ effects are included, faces an existential decarbonization challenge: unlike road transport, which can electrify, or power generation, which can shift to renewables, aviation requires energy-dense liquid fuels or fundamentally new propulsion technologies to achieve net-zero emissions. This report examines the two principal pathways to sustainable aviation — sustainable aviation fuels (SAF) and hydrogen-powered aircraft — and the market, technology, and policy dynamics shaping the transition.

      The global sustainable aviation fuel market reached an estimated USD 2.8 billion in 2024, with production volume of approximately 1.6 million tonnes (0.5% of total jet fuel consumption). This nascent market is projected to grow at a compound annual growth rate of 48.2% through 2035, reaching a market size of approximately USD 185 billion and production volume of 120 million tonnes, driven by escalating regulatory mandates, airline commitments, and technology cost reductions. The hydrogen aircraft market — encompassing hydrogen combustion and fuel cell propulsion systems, supporting infrastructure, and aircraft modifications — is earlier-stage but potentially transformative, with projected commercial entry of regional hydrogen aircraft by 2035 and narrow-body aircraft by 2040.

      This report provides a comprehensive analysis across six dimensions: SAF technology pathways and production economics, hydrogen aircraft development and technology readiness, market sizing and growth projections, the evolving competitive landscape, policy and regulatory frameworks driving adoption, and the strategic outlook through 2040. Drawing on aviation industry data, technology developer disclosures, policy analysis, and original market modeling, this report offers actionable intelligence for airlines, fuel producers, aircraft manufacturers, investors, and policymakers.

      Key findings include: (1) the SAF market is projected to grow from USD 2.8 billion in 2024 to USD 185 billion by 2035 (48.2% CAGR), driven by mandates requiring 2–70% SAF blending across major aviation markets; (2) hydrogen aircraft represent a USD 45 billion addressable market by 2040, with regional turboprop aircraft expected to enter commercial service by 2035; (3) SAF production costs remain 2–5× conventional jet fuel but are projected to reach parity for certain pathways by 2035; (4) the EU, US, and UK have established binding SAF mandates creating guaranteed demand of approximately 50 million tonnes annually by 2035; and (5) the competitive landscape spans oil majors, clean energy startups, aerospace OEMs, and technology companies, with over USD 35 billion in announced SAF production investment.

