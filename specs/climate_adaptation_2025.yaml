      - type: section
        title: "1.3 From Reactive Recovery to Proactive Resilience"
        content: |
          The global approach to climate risk is undergoing a fundamental paradigm shift from reactive disaster response to proactive resilience investment. This shift is driven by three converging forces: the escalating frequency and severity of climate-related disasters, which are overwhelming traditional disaster response and insurance mechanisms; the growing availability of climate risk data and analytics that enable more precise targeting of adaptation investments; and the recognition by financial regulators and credit rating agencies that climate physical risk is a material threat to sovereign creditworthiness, municipal bond ratings, and asset valuations.

          The insurance industry has emerged as a powerful catalyst for adaptation investment. Global insured losses from natural catastrophes reached USD 145 billion in 2024, the fifth consecutive year exceeding USD 100 billion. In high-risk markets including Florida, California, and parts of Australia, private insurers are withdrawing coverage or imposing prohibitive premiums, creating "insurance deserts" that threaten property values and mortgage markets. This dynamic is forcing governments to intervene with resilience mandates, public insurance backstops, and infrastructure standards that reduce physical risk to insurable levels.

          Credit rating agencies have begun systematically incorporating climate physical risk into their assessments. Moody's, S&P, and Fitch now evaluate climate exposure as part of their sovereign and municipal credit rating methodologies, with explicit downgrade risks for entities that fail to invest in adaptation. A 2024 S&P analysis found that 27% of rated sovereigns face potential credit-negative impacts from climate physical risks by 2050 without adaptation investment, rising to 58% under a high-warming scenario. This creates a powerful financial incentive for governments to prioritize resilience spending.

          The military and national security establishment has also emerged as an unexpected but influential adaptation advocate. The U.S. Department of Defense identifies climate change as a "threat multiplier" that exacerbates geopolitical instability, damages military infrastructure (Naval Station Norfolk faces recurrent flooding, while wildfires threaten bases in the Western United States), and creates humanitarian crisis response demands that strain military capacity. The UK Ministry of Defence, NATO, and allied defense establishments have published similar assessments, lending geopolitical urgency to adaptation investment.

