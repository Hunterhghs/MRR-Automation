      - type: section
        title: "4.2 Hydrogen Aircraft Market: The Long Game"
        content: |
          The hydrogen aircraft market — encompassing airframe modifications, propulsion systems, and airport hydrogen infrastructure — is earlier-stage than SAF but represents a potentially transformative market opportunity. We estimate the addressable market for hydrogen aircraft and supporting infrastructure at approximately USD 45 billion by 2040, growing rapidly thereafter to an estimated USD 180 billion by 2050.

          This projection is based on: regional aircraft fleet replacement (approximately 3,000 regional turboprops globally that could be replaced by hydrogen aircraft between 2035–2045 at an average cost of USD 25–35 million per aircraft, representing a USD 90 billion airframe market); hydrogen propulsion system market (engines, fuel cells, cryogenic tanks) estimated at USD 30–50 billion cumulatively through 2045; and airport hydrogen infrastructure investment estimated at USD 50–100 billion through 2045 to equip approximately 200 major airports with hydrogen fueling capability.

          The commercial timeline is highly uncertain and dependent on technology certification, hydrogen production cost trajectories, and airline willingness to invest in a new propulsion paradigm. Our base case assumes: 2028–2032: certification and entry-into-service of small hydrogen aircraft (under 20 seats) for niche routes; 2035: entry-into-service of regional hydrogen turboprops (50–80 seats); 2040: entry-into-service of hydrogen narrow-body aircraft (150–200 seats); 2045+: potential hydrogen wide-body aircraft for medium-haul routes.

