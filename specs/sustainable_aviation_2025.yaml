  - type: chapter
    title: "The Aviation Decarbonization Challenge"
    content: |
      Aviation is widely recognized as one of the hardest-to-abate sectors of the global economy. The fundamental physics of flight — the need for high energy density, low weight, and extreme reliability — has made the industry dependent on kerosene-based jet fuel for over seven decades. Decarbonizing aviation requires either replacing that fuel with sustainable alternatives that can be used in existing aircraft and infrastructure, or developing fundamentally new propulsion technologies. Both pathways involve extraordinary technical, economic, and infrastructure challenges that will require trillions of dollars in investment over the coming decades.

      This chapter establishes the context: the scale of aviation's climate impact, the physics constraints that make aviation uniquely difficult to decarbonize, the regulatory and societal pressures driving the transition, and the technology pathways being pursued.

    subsections:
      - type: section
        title: "1.1 Aviation's Climate Footprint: Scale and Urgency"
        content: |
          Global aviation consumed approximately 370 billion liters (295 million tonnes) of jet fuel in 2024, generating approximately 920 million tonnes of CO₂ — roughly 2.5% of global energy-related CO₂ emissions. When non-CO₂ effects are included — primarily contrail-induced cirrus clouds, nitrogen oxide (NOx) emissions, and water vapor at altitude — aviation's contribution to effective radiative forcing is estimated at 3.5% of the anthropogenic total, with some studies suggesting it could be as high as 5%.

          The sector's emissions have grown at a compound rate of approximately 3.5% annually since 2010 (excluding the pandemic disruption of 2020–2021), significantly outpacing efficiency improvements of approximately 1.5% per year from improved aircraft design, engine efficiency, and operational optimization. Under business-as-usual scenarios, aviation CO₂ emissions are projected to reach 1.5–2.0 billion tonnes annually by 2040, potentially consuming 12–17% of the remaining global carbon budget consistent with a 1.5°C warming pathway.

          The International Civil Aviation Organization (ICAO) has adopted a Long-Term Aspirational Goal of net-zero carbon emissions for international aviation by 2050, endorsed by 193 member states. The International Air Transport Association (IATA), representing 300+ airlines, has committed to net-zero by 2050. These commitments, combined with the physical reality that aviation has no viable near-term alternative to liquid fuels for long-haul flight, create an extraordinary market opportunity for sustainable aviation fuels and, in the longer term, hydrogen aircraft.

          The urgency is amplified by the sector's visibility and the concentration of emissions among a relatively small number of frequent flyers. An estimated 1% of the world's population accounts for 50% of aviation emissions. Business and first-class travel generates 3–4× the emissions per passenger-kilometer of economy class. This concentration makes aviation a politically salient target for climate policy, with growing public pressure for action — including flight-shaming movements in Europe, corporate travel policies reducing air travel, and investor pressure on airlines and aircraft manufacturers.

      - type: callout
        content: "Aviation's energy density requirement is extraordinary: jet fuel provides approximately 43 MJ/kg, compared to 0.5 MJ/kg for the best lithium-ion batteries — an 86× difference. This physics constraint means that battery-electric propulsion is viable only for small aircraft on short routes (under 500 km), while hydrogen (120 MJ/kg) offers a potential pathway but requires completely new aircraft designs and infrastructure. For long-haul aviation — which accounts for approximately 70% of aviation emissions — sustainable aviation fuels are the only viable decarbonization pathway for the foreseeable future."

      - type: section
        title: "1.2 The Two Pathways: SAF and Hydrogen"
        content: |
          The decarbonization of aviation is generally conceived as a two-horizon strategy. In the near and medium term (2025–2040), sustainable aviation fuels — liquid hydrocarbon fuels produced from non-fossil feedstocks that are chemically similar to conventional jet fuel and can be used in existing aircraft and infrastructure as "drop-in" replacements — represent the primary decarbonization lever. SAF can be produced through multiple pathways: hydroprocessed esters and fatty acids (HEFA) from waste oils and fats; alcohol-to-jet (ATJ) from ethanol produced from corn, sugarcane, or cellulosic biomass; Fischer-Tropsch synthesis from gasified biomass or municipal solid waste; power-to-liquid (PtL) or e-fuels produced from green hydrogen and captured CO₂; and emerging pathways including hydrothermal liquefaction and pyrolysis.

          In the longer term (2035–2050), hydrogen-powered aircraft — using either direct combustion in modified gas turbine engines or hydrogen fuel cells powering electric motors — offer the prospect of zero-emission flight. Hydrogen combustion produces only water vapor (with some NOx), while fuel cells produce only water. Both approaches require completely new aircraft designs, new fueling infrastructure at airports, and large-scale production of green hydrogen. Regional aircraft (50–100 seats, up to 2,000 km range) are expected to be the first hydrogen aircraft segment to enter commercial service, with narrow-body aircraft (150–250 seats, up to 5,000 km) potentially following by 2040.

          The two pathways are complementary rather than competitive: SAF addresses the entire existing fleet of 25,000+ commercial aircraft and is essential for long-haul aviation, while hydrogen aircraft represent a longer-term bet on zero-emission flight for short and medium-haul routes. Both require massive investment in production capacity, infrastructure, and technology development.

