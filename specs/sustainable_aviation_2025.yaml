  - type: chapter
    title: "Policy, Mandates & Regulatory Drivers"
    content: |
      Government policy is the primary demand driver for sustainable aviation, creating guaranteed markets through blending mandates, production subsidies, and carbon pricing that bridge the cost gap between SAF and conventional jet fuel. This chapter examines the policy frameworks in key jurisdictions and their implications for market development.

    subsections:
      - type: section
        title: "5.1 Mandate Mechanisms: Guaranteeing Demand"
        content: |
          The most powerful policy instrument for SAF market creation is the blending mandate — a regulatory requirement that aviation fuel suppliers include a specified minimum percentage of SAF in the jet fuel they deliver. Mandates create guaranteed demand that underpins production investment, enabling project developers to secure financing against the certainty of regulated offtake.

          The European Union's ReFuelEU Aviation regulation, adopted in 2023, is the world's most ambitious SAF mandate: 2% SAF from 2025, 6% from 2030, 20% from 2035, 34% from 2040, 42% from 2045, and 70% from 2050. Within these targets, sub-mandates for e-fuels (PtL-SAF) start at 0.7% in 2030, rising to 5% in 2035 and 35% in 2050. The regulation applies to all flights departing from EU airports, covering approximately 60 million tonnes of annual jet fuel. The EU has also established a SAF allowance mechanism under its Emissions Trading System (EU ETS), providing a financial incentive for SAF use through avoided carbon allowance costs.

          The United Kingdom has established a SAF mandate of 2% from 2025, rising to 10% by 2030 and 22% by 2040, with a target of 35% by 2050. The UK mandate includes a cap on HEFA-SAF to encourage diversification into advanced pathways, and a separate obligation for PtL-SAF starting at 0.2% in 2028 and reaching 3.5% by 2040. The UK has also introduced a revenue certainty mechanism that provides a guaranteed price floor for SAF producers, reducing investment risk.

          The United States has taken a subsidy-based rather than mandate-based approach. The SAF Grand Challenge (2021) set targets of 3 billion gallons (9 million tonnes) by 2030 and 35 billion gallons (105 million tonnes) by 2050. The Inflation Reduction Act (2022) established SAF tax credits: USD 1.25 per gallon for SAF achieving 50% lifecycle GHG reduction, with an additional USD 0.01 per gallon for each percentage point above 50% (up to USD 1.75/gallon). Several US states, including California (Low Carbon Fuel Standard), Oregon, and Washington, have established additional state-level incentives. The US approach provides strong production incentives but creates less guaranteed demand than mandates.

          Other jurisdictions are following suit. Japan has established a SAF mandate of 10% by 2030. Singapore has a target of 1% by 2026. Brazil is leveraging its ethanol industry for ATJ-SAF production. India is developing a SAF roadmap. The International Civil Aviation Organization's CORSIA (Carbon Offsetting and Reduction Scheme for International Aviation) provides a global framework that will increasingly drive SAF demand as offsetting requirements tighten.

