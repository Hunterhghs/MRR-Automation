      - type: section
        title: "2.2 Government IT Spending by Tier"
        content: |
          Government IT spending is distributed across three principal tiers, each with distinct procurement patterns, technology priorities, and vendor engagement models.

          National and federal governments account for approximately 42% of global GovTech spending (USD 257 billion). National governments are the primary investors in large-scale digital infrastructure — national digital identity systems, whole-of-government cloud platforms, interoperable data exchange layers, and national cybersecurity operations centers. Procurement is typically concentrated among large systems integrators and hyperscale cloud providers, though the rise of government digital service units (the UK's Government Digital Service, the US Digital Service, Canada's Digital Service, Singapore's GovTech agency) is creating new pathways for specialized GovTech vendors.

          State and provincial governments account for approximately 28% (USD 171 billion), with spending concentrated in healthcare IT, education technology, transportation systems, and justice and public safety technology. State-level procurement is more fragmented than federal, creating opportunities for mid-market technology vendors and regional systems integrators. The diversity of state-level digital maturity — from highly digitized states like California, New South Wales, and Bavaria to states with limited digital infrastructure — creates a wide spectrum of market opportunities.

          Local and municipal governments account for approximately 22% (USD 135 billion), with spending concentrated in citizen-facing services (permitting, licensing, benefit administration), public works and utilities, and community engagement platforms. Municipal procurement is the most fragmented segment, with over 500,000 local government entities globally making independent technology decisions. This fragmentation has historically limited vendor scale in the municipal segment, but the emergence of government technology marketplaces and shared service platforms is beginning to consolidate procurement.

          Cross-government and inter-agency spending accounts for approximately 8% (USD 49 billion), encompassing shared digital infrastructure, interoperability platforms, and whole-of-government initiatives that span multiple tiers.

