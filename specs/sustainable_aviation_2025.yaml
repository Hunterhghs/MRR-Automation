  - type: chapter
    title: "Competitive Landscape"
    content: |
      The sustainable aviation competitive landscape spans fuel producers, technology developers, aerospace OEMs, and infrastructure providers. This chapter maps the competitive dynamics across the SAF and hydrogen aircraft value chains.

    subsections:
      - type: section
        title: "6.1 SAF Producers: Oil Majors, Clean Energy, and Startups"
        content: |
          The SAF production landscape is characterized by the entry of major oil and energy companies alongside a cohort of venture-backed clean energy startups. The competitive dynamics reflect the capital intensity of fuel production, the importance of feedstock access, and the technology risk associated with different production pathways.

          Major oil and energy companies — including Neste (the world's largest SAF producer, with 1.5 million tonnes of annual capacity), Shell, BP, TotalEnergies, Phillips 66, and Valero — are investing heavily in HEFA-SAF production, leveraging their existing refinery infrastructure, feedstock procurement capabilities, and balance sheet strength. Neste alone has committed to investing EUR 1.9 billion in expanding its Rotterdam renewables refinery to increase SAF production. These incumbents have advantages in project finance, regulatory expertise, and customer relationships, but may face disrupted economics if advanced pathways (PtL, FT) become cost-competitive with HEFA.

          Clean energy startups are driving innovation in non-HEFA pathways. LanzaJet (ATJ, backed by Suncor, Mitsui, Shell, and British Airways) opened the world's first commercial ATJ-SAF plant in 2024 and has a pipeline of projects across the US, UK, Japan, and Australia. Fulcrum BioEnergy (FT from municipal solid waste) has pioneered gasification-to-SAF though faced operational challenges. Velocys (FT from biomass and waste) was acquired out of administration in 2024, reflecting both the technology promise and the financial challenges of advanced SAF pathways. HIF Global, backed by Porsche, Siemens Energy, and others, is developing the world's largest PtL-SAF project in Chile, leveraging the country's exceptional renewable energy resources.

          The technology licensing and engineering, procurement, and construction (EPC) segment — including Honeywell UOP, Topsoe, Axens, and Johnson Matthey — provides the process technology and plant design services that enable SAF production across pathways. These companies are competing to develop the most cost-effective, feedstock-flexible SAF technologies.

      - type: section
        title: "6.2 Aerospace OEMs: Betting on Hydrogen"
        content: |
          The aerospace OEM landscape for hydrogen aircraft is led by Airbus, with its ZEROe program, and a cohort of startups including ZeroAvia, Universal Hydrogen, and H2FLY. Boeing has adopted a more cautious approach, focusing on SAF as the near-term priority while monitoring hydrogen technology development.

          Airbus has committed to bringing a hydrogen-powered commercial aircraft to market by 2035, investing in multiple concept designs, ground testing of hydrogen combustion engines (in partnership with CFM International), and airport hydrogen infrastructure development. The ZEROe program represents a multibillion-euro investment and a strategic bet that hydrogen will become a viable propulsion technology for short and medium-haul aviation. Airbus's approach emphasizes direct combustion of liquid hydrogen in modified gas turbines, leveraging its expertise in aircraft integration and certification.

          ZeroAvia, with over USD 250 million in funding from investors including Bill Gates's Breakthrough Energy Ventures, Amazon's Climate Pledge Fund, Shell, and United Airlines, is pursuing fuel cell-electric propulsion for regional aircraft. The company's strategy focuses on retrofitting existing aircraft types (Dornier 228, Dash 8, ATR 72) with hydrogen fuel cell powertrains, providing a faster path to market than clean-sheet aircraft designs. ZeroAvia has secured over 2,000 engine pre-orders and partnerships with major airlines.

          Engine manufacturers — Rolls-Royce, GE Aerospace, CFM International, Pratt & Whitney — are investing in hydrogen combustion technology for future aircraft engines. Rolls-Royce has successfully tested a Pearl 15 business jet engine running on 100% hydrogen, and CFM International (a GE-Safran joint venture) is leading the hydrogen combustion engine development for Airbus's ZEROe program.

      - type: key_findings
        content: |
          SAF production is dominated by HEFA (85% of current output) but PtL (e-fuels) is the most scalable long-term pathway with unlimited feedstock availability
          Oil majors and clean energy startups are both investing heavily, with over USD 35 billion in announced SAF production capacity globally
          Airbus leads hydrogen aircraft development (ZEROe, target 2035 entry-into-service), while ZeroAvia leads fuel cell-electric propulsion for regional aircraft
          The SAF competitive landscape spans fuel producers, technology licensors, and EPC contractors, with project financing and feedstock access as key competitive differentiators
          Airport hydrogen infrastructure (USD 100–250B cumulative through 2050) represents a parallel market opportunity alongside aircraft and propulsion systems

  - type: chapter
    title: "Case Studies in Sustainable Aviation"
    content: |
      This chapter presents three case studies illustrating the diverse pathways to sustainable aviation, spanning SAF production at scale, hydrogen aircraft development, and integrated airline sustainability strategy.

    subsections:
      - type: case_study
        title: "Case Study 1: Neste — Building the World's Largest SAF Producer"
        case_study_data:
          company: "Neste Corporation (Finland) — Founded 1948, Market Cap ~EUR 25B"
          industry: "Renewable Fuels / SAF Production"
          challenge: "Neste, historically a conventional oil refiner, recognized in the early 2000s that climate policy would create growing demand for low-carbon transportation fuels. The company made a strategic pivot to renewable diesel and sustainable aviation fuel, betting that its hydroprocessing expertise could be applied to bio-based feedstocks and that policy mandates would create guaranteed markets. The challenge was scaling a new fuel type from laboratory to global production while managing feedstock supply chains and navigating evolving regulatory frameworks."
          solution: "Neste invested EUR 3.5 billion in building the world's largest renewable fuels production complex, centered on refineries in Rotterdam (Netherlands), Singapore, and Porvoo (Finland), with total renewable product capacity of 4.5 million tonnes annually, of which approximately 1.5 million tonnes is SAF. The company developed a global waste and residue feedstock supply chain, sourcing used cooking oil, animal fat, and vegetable oil processing residues from over 40 countries. Neste's proprietary NEXBTL hydroprocessing technology enables flexible feedstock use and produces a high-quality renewable fuel chemically identical to conventional counterparts. The company has secured offtake agreements with major airlines and has achieved profitability in its renewable products segment."
          results: "Neste is the world's largest SAF producer, supplying fuel to airlines including Lufthansa, American Airlines, Delta, Singapore Airlines, and others. The company delivered 1.5 million tonnes of SAF-equivalent production capacity with announced plans to expand to 2.2 million tonnes by 2026. Neste's renewable products segment generated EUR 7.2 billion in revenue and EUR 1.5 billion in operating profit in 2024, demonstrating the commercial viability of SAF production at scale. The company's success has validated the HEFA pathway and demonstrated that policy mandates (particularly the EU's Renewable Energy Directive and ReFuelEU Aviation) can successfully catalyze private investment in SAF production."

      - type: case_study
        title: "Case Study 2: ZeroAvia — Pioneering Hydrogen-Electric Flight"
        case_study_data:
          company: "ZeroAvia (USA/UK) — Founded 2017, HQ Hollister, CA & Kemble, UK"
          industry: "Hydrogen Aircraft / Fuel Cell Propulsion"
          challenge: "While automotive electrification advanced rapidly in the 2010s, the physics of battery energy density made battery-electric flight viable only for very small aircraft on very short routes. The founders of ZeroAvia identified hydrogen fuel cell-electric propulsion as the most promising pathway to zero-emission flight for regional aircraft, combining the high energy density of hydrogen with the efficiency of electric motors. The challenge was developing a complete hydrogen-electric powertrain — fuel cells, electric motors, power electronics, cryogenic hydrogen storage, and system integration — and certifying it for commercial aviation, all while building an entirely new category of aviation technology."
          solution: "ZeroAvia developed a modular hydrogen-electric powertrain platform, starting with a 600 kW system for 9–19 seat aircraft and scaling to 2–5 MW systems for 40–80 seat regional aircraft. The company adopted a retrofit strategy — modifying existing certified aircraft types (Dornier 228, later Dash 8 and ATR 72) rather than designing a clean-sheet aircraft — to accelerate time to market. ZeroAvia established facilities in both California and the UK, leveraging the aviation expertise and supply chains in both regions. The company raised over USD 250 million from strategic investors including American Airlines, United Airlines, Alaska Airlines, Shell, and Bill Gates's Breakthrough Energy Ventures, and secured over 2,000 engine pre-orders. In 2023, ZeroAvia completed the first flight of a 19-seat Dornier 228 aircraft powered by its hydrogen-electric prototype powertrain."
          results: "ZeroAvia has completed multiple flight test campaigns of its hydrogen-electric powertrain, demonstrated a 600 kW system on a 19-seat aircraft, and is targeting certification of its 600 kW system (9–19 seat aircraft) by 2025, with the 2–5 MW system (40–80 seat regional aircraft) targeting certification by 2027. The company has established partnerships with airports (Rotterdam/The Hague, London Heathrow) to develop hydrogen refueling infrastructure, recognizing that aircraft and infrastructure must develop in parallel. ZeroAvia's progress has accelerated the hydrogen aviation sector, demonstrating that hydrogen-electric propulsion is technically viable for regional aircraft."

      - type: case_study
        title: "Case Study 3: United Airlines — An Airline's Multi-Pathway Sustainability Strategy"
        case_study_data:
          company: "United Airlines (USA) — Founded 1926, Market Cap ~USD 30B"
          industry: "Commercial Aviation / Airline Sustainability"
          challenge: "United Airlines, the third-largest US carrier by revenue, faced the same decarbonization challenge as all global airlines: how to reduce emissions while continuing to grow passenger volumes, against a backdrop of increasing regulatory pressure, investor expectations, and customer demand for sustainable travel. The airline needed to develop a sustainability strategy that addressed both near-term emissions (SAF procurement) and longer-term technology transformation (investment in next-generation aircraft), while managing the cost premium of sustainable alternatives in a highly competitive, low-margin industry."
          solution: "United adopted a multi-pathway sustainability strategy encompassing: (1) aggressive SAF procurement — becoming the world's largest SAF consumer, with offtake agreements exceeding 3 billion gallons (9 million tonnes), more than the entire global SAF production in 2024; (2) direct investment in SAF production — launching the United Airlines Ventures Sustainable Flight Fund, a USD 200+ million investment vehicle backing SAF startups including Fulcrum BioEnergy and Cemvita; (3) investment in future aircraft technology — placing purchase agreements for electric vertical takeoff and landing (eVTOL) aircraft, supersonic aircraft with 100% SAF capability (Boom Supersonic), and hydrogen-electric aircraft through investments in ZeroAvia and Heart Aerospace; (4) operational efficiency — fleet modernization with more fuel-efficient aircraft; and (5) customer engagement — launching an Eco-Skies Alliance that enables corporate customers to contribute to SAF procurement."
          results: "United has emerged as the airline industry's most aggressive sustainability investor, with commitments spanning SAF procurement, production investment, and next-generation aircraft technology. The airline's SAF offtake agreements, if fulfilled, would represent approximately 10% of the projected global SAF supply in 2030. United's multi-pathway strategy — investing across SAF production, eVTOL, hydrogen aircraft, and carbon capture — reflects a portfolio approach to an uncertain technology transition, hedging against the risk that any single decarbonization pathway proves too costly or too slow."



  - type: chapter
    title: "Regional Production Hubs & Supply Chains"
    content: |
      SAF production geography is being shaped by the intersection of feedstock availability, renewable energy resources, policy support, and proximity to major aviation markets. This chapter examines the emerging regional production hubs and their implications for global SAF supply chains.

    subsections:
      - type: section
        title: "North America: The Early Leader"
        content: |
          The United States leads global SAF production, accounting for approximately 55% of 2024 output, driven by the combination of the Inflation Reduction Act's generous production tax credits (USD 1.25–1.75/gallon), the established renewable diesel industry providing a technology and feedstock base, and the world's largest aviation market creating concentrated demand. California's Low Carbon Fuel Standard provides an additional USD 1.00–1.50/gallon incentive for SAF delivered in the state. Major production clusters are emerging in California (World Energy, Aemetis), the Gulf Coast (Phillips 66, Valero), and the Midwest (Gevo, LanzaJet).

      - type: section
        title: "Europe: The Mandate-Driven Market"
        content: |
          Europe's SAF market is driven by the ReFuelEU Aviation mandate, which creates guaranteed demand of 20% SAF (approximately 10 million tonnes) by 2035. Production is concentrated in the Netherlands (Neste's Rotterdam facility), Finland (Neste's Porvoo facility), France (TotalEnergies), and the UK. Norway is emerging as a PtL-SAF hub through Norsk e-Fuel, leveraging the country's abundant hydropower for green hydrogen production. The EU's Innovation Fund and Horizon Europe program provide substantial grant funding for advanced SAF demonstration projects.

      - type: section
        title: "Middle East & Africa: The Future Powerhouse"
        content: |
          The Middle East, with its combination of abundant solar energy for green hydrogen production, existing oil and gas infrastructure and expertise, and strategic location at the crossroads of global aviation routes, is positioning to become a major SAF production hub. The UAE's Masdar and France's TotalEnergies have announced a joint PtL-SAF project in Abu Dhabi. Saudi Arabia's NEOM project includes plans for the world's largest green hydrogen facility, with aviation fuel as a target market. Qatar, Oman, and Morocco are also developing PtL-SAF projects.

          Africa's potential as a SAF feedstock supplier — particularly for ATJ-SAF from sugarcane and agricultural residues, and FT-SAF from biomass — is significant but unrealized. The continent has abundant land, favorable growing conditions, and growing aviation markets (Ethiopian Airlines, Kenya Airways, South African Airways). Development finance institutions are exploring SAF production projects in South Africa, Kenya, Ethiopia, and Morocco, but investment remains early-stage.

      - type: section
        title: "Asia-Pacific: The Growth Frontier"
        content: |
          The global SAF supply chain is in its infancy but developing rapidly. Currently, SAF is transported from a small number of production facilities to a limited number of airports (primarily Los Angeles, San Francisco, Amsterdam Schiphol, and Singapore Changi) via existing fuel distribution infrastructure — trucks, barges, and pipelines. As production scales, dedicated SAF logistics will be required, including storage terminals, blending facilities, and airport fuel hydrant system integration. The logistics infrastructure investment requirement is estimated at USD 10–20 billion cumulatively through 2035.

          Asia-Pacific represents the fastest-growing aviation market globally, with IATA projecting that the region will account for 40% of global air travel by 2040. Japan's 10% SAF mandate by 2030 and Singapore's emerging framework are creating demand pull. Australia, with abundant land and renewable energy resources, is positioning as both a SAF producer and an exporter. India, with its large agricultural sector, is exploring ATJ-SAF from sugarcane ethanol and FT-SAF from agricultural residues.


  - type: chapter
    title: "Airline Economics & SAF Procurement Strategies"
    content: |
      For airlines, sustainable aviation fuel represents both the primary decarbonization lever and a significant financial challenge. SAF typically costs 2–5× more than conventional Jet A-1 fuel, and fuel already represents 20–35% of airline operating costs — the largest single cost category for most carriers. This chapter examines the economics of SAF adoption from the airline perspective and the procurement strategies being deployed.

    subsections:
      - type: section
        title: "Fuel Cost Economics & Airline Margins"
        content: |
          The impact of SAF adoption on airline profitability depends critically on the cost premium, the blending percentage, and the airline's ability to pass costs through to customers. At current SAF prices (2–5× conventional jet fuel), a 10% SAF blend adds approximately 2–4% to total operating costs for a typical full-service carrier. For a low-cost carrier with thinner margins, the impact is proportionally greater. IATA estimates that the global airline industry's annual fuel bill would increase by USD 15–30 billion at 10% SAF blending at current prices, rising to USD 75–150 billion at 50% blending.

          However, the cost impact varies significantly by airline business model and route structure. Premium carriers (business and first-class heavy) can absorb higher fuel costs more easily than low-cost carriers, as fuel represents a smaller share of total cost per passenger and premium passengers are less price-sensitive. Long-haul carriers have greater SAF requirements per flight but also benefit from the fact that SAF's cost premium is a smaller percentage of the total fare on long-haul routes. Cargo carriers, which compete more directly on cost, face the greatest challenge in absorbing SAF cost premiums.

          The consumer willingness-to-pay for sustainable aviation is emerging as a partial solution. Surveys indicate that 40–60% of air travelers express willingness to pay a premium for sustainable flights, though stated preferences typically overstate actual behavior. Corporate travel programs — driven by Scope 3 emissions reporting requirements — are emerging as the most reliable source of willingness-to-pay, with companies including Microsoft, McKinsey, BCG, and major banks purchasing SAF certificates to offset employee air travel emissions at premiums of USD 200–500 per tonne of CO₂.

      - type: section
        title: "SAF Procurement Models & Offtake Agreements"
        content: |
          Airlines are deploying multiple procurement models to secure SAF supply, reflecting the immaturity of the SAF market and the uncertainty of future production volumes and prices. The dominant model is the long-term offtake agreement — a binding contract in which an airline commits to purchase a specified volume of SAF over a multi-year period (typically 5–15 years) at a pricing formula linked to conventional jet fuel plus a premium. These agreements provide the demand certainty that SAF producers need to secure project financing. United Airlines leads with offtake agreements exceeding 3 billion gallons, followed by Delta, American Airlines, Southwest, and international carriers including Lufthansa Group, Air France-KLM, and IAG.

          Book-and-claim (also called mass balance) systems enable airlines to purchase SAF and claim the emissions reduction even when the physical SAF is delivered to a different airport than where the airline operates. This is critical because SAF production is concentrated at a small number of locations while airlines operate globally. A US airline can purchase SAF produced in California, receive the environmental attributes, while the physical fuel is used by aircraft at Los Angeles International Airport. Book-and-claim dramatically increases the addressable market for SAF by decoupling production location from consumption location.

          Direct investment in SAF production represents the most ambitious procurement strategy. Airlines including United (United Airlines Ventures Sustainable Flight Fund), Delta, JetBlue, and Alaska Airlines have invested directly in SAF startups and production facilities, seeking to secure supply, influence technology development, and potentially capture upside from successful SAF ventures. This strategy is capital-intensive but provides the greatest supply security and potential for favorable pricing.

