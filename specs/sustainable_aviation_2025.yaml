  - type: chapter
    title: "Market Sizing & Growth Projections"
    content: |
      The sustainable aviation market encompasses two distinct but interconnected segments: sustainable aviation fuels (SAF) and hydrogen aircraft and infrastructure. This chapter presents our original market sizing and growth projections for both segments through 2040.

    subsections:
      - type: section
        title: "4.1 SAF Market: From Niche to Mainstream"
        content: |
          The global SAF market reached an estimated USD 2.8 billion in 2024, with production volume of approximately 1.6 million tonnes. While this represents just 0.5% of total jet fuel consumption, the growth trajectory is set to be extraordinary: regulatory mandates in the EU, UK, US, and other jurisdictions will require SAF to represent 5–20% of aviation fuel by 2030–2035, creating guaranteed demand of 50+ million tonnes annually.

          We project the SAF market will reach USD 185 billion by 2035, representing a 48.2% CAGR from 2024. This projection is driven by: EU ReFuelEU mandate requiring 20% SAF by 2035 (approximately 10 million tonnes); UK SAF mandate of 10% by 2030 (approximately 1.5 million tonnes); US SAF Grand Challenge targeting 9 million tonnes by 2030; Japan's mandate of 10% by 2030; Singapore's target of 1% by 2026 rising to 3–5% by 2030; and voluntary airline offtake agreements that already exceed 40 million tonnes in total commitments.

          By production pathway, HEFA will remain the dominant SAF type through 2030, accounting for approximately 70% of production, due to technology maturity and established feedstock supply chains. ATJ will grow to approximately 15% of production as LanzaJet and other producers scale. By 2035, PtL (e-fuels) is projected to reach 15–20% of production as green hydrogen costs decline, with a trajectory toward becoming the dominant pathway by 2050 due to its unlimited feedstock availability. FT-SAF from biomass and waste will represent 10–15% of production.

          The geographic distribution of SAF production will shift over time. Currently, the US accounts for approximately 55% of production, Europe 30%, and Asia-Pacific 12%. By 2035, we project the US share will decline to approximately 35% as European and Asia-Pacific production scales, with Europe reaching 30%, Asia-Pacific 20%, and the Middle East (leveraging low-cost renewable electricity for PtL-SAF) emerging as a significant producer at 10%.

